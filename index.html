      }

        opacity: 1;
      }

        opacity: 0;
      }

    .sparkle {
      position: fixed;
      width: 5px;
      height: 5px;
      background: white;
      border-radius: 50%;
      opacity: 0.7;
      animation: twinkle 2s infinite alternate;

        opacity: 1;

      font-size: 2.5em;
      color: #c46b86;

      border-radius: 20px;
      border: none;
      width: 200px;
      text-align: center;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 20px;
      background: #ff9ec0;
      color: white;
      margin-top: 10px;
    }

    /* ENVELOPE */
    .envelope {
      width: 230px;
      height: 150px;
      background: #ffc6d6;
      margin: 120px auto;
      border-radius: 14px;
      position: relative;
      cursor: pointer;
      transition: 0.6s ease;
    }

    .envelope:hover {
      transform: scale(1.1);
    }

    .envelope::before {
      content: "";
      position: absolute;
      border-left: 115px solid transparent;
      border-right: 115px solid transparent;
      border-bottom: 75px solid #ff8fb1;
      top: -75px;
      transition: 0.8s ease;
    }

    .envelope.open::before {
      transform: rotateX(180deg);
    }

    .envelope.open {
      transform: translateY(-30px) scale(1.15);
    }

    /* FOLDERS */
    .folders {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 20px;
      margin-top: 80px;
    }

    .folder {
      background: #ffd1dc;
      padding: 16px;
      border-radius: 14px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      align-items: center;

      width: 85%;

      font-size: 1.3em;
      white-space: pre-line;

      display: none;

      top: 0;
      left: 0;

      height: 100%;

      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

          /* LOAD */
          function load() {
            let c = document.getElementById("folders");
            c.innerHTML = "";
            data.forEach((d, i) => {
              let div = document.createElement("div");
              div.className = "folder";
              div.innerText = d.n;
              div.onclick = () => openLetter(i);
              c.appendChild(div);
            });
          }
          /* LETTER */
          function openLetter(i) {
            let modal = document.getElementById("modal");
            let letter = document.getElementById("letter");
            modal.style.display = "flex";
            letter.innerHTML = "";
            type(letter, data[i].m, 0);
          }

          function type(el, t, i) {
            if (i < t.length) {
              el.innerHTML += t.charAt(i);
              setTimeout(() => type(el, t, i + 1), 18);
            }
          }

          function closeModal() {
            document.getElementById("modal").style.display = "none";
          }
          /* FINAL */
          function showFinal() {
            document.getElementById("final").style.display = "flex";
            butterflyStorm();
          }
          /* BUTTERFLY STORM */
          function butterflyStorm() {
            for (let i = 0; i < 80; i++) {
              let b = document.createElement("div");
              b.className = "butterfly";
              b.style.left = Math.random() * 100 + "vw";
              b.style.animationDuration = (4 + Math.random() * 4) + "s";
              document.body.appendChild(b);
            }
          }
